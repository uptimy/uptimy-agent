name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Validate tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG does not match vX.Y.Z pattern"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Run tests
        run: make test

      - name: Build release tarballs
        run: make dist VERSION="${VERSION}"

      - name: Build Docker image
        run: |
          make docker-build VERSION="${VERSION}"
          docker tag uptimy/agent:"${VERSION}" uptimy/agent:latest

      - name: Prepare release assets
        run: |
          # Generate checksums for all tarballs
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cd ..

          # Bundle installer scripts into dist/ for upload
          cp scripts/install.sh dist/install.sh
          cp scripts/uninstall.sh dist/uninstall.sh
          chmod +x dist/install.sh dist/uninstall.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: uptimy-agent ${{ env.TAG }}
          generate_release_notes: true
          body: |
            ## Quick Install

            ```bash
            curl -sSfL https://raw.githubusercontent.com/uptimy/uptimy-agent/main/scripts/install.sh | sudo bash
            ```

            Or install a specific version:
            ```bash
            UPTIMY_VERSION=${{ env.VERSION }} curl -sSfL https://raw.githubusercontent.com/uptimy/uptimy-agent/main/scripts/install.sh | sudo bash
            ```

            See [examples/](https://github.com/uptimy/uptimy-agent/tree/main/examples) for common self-healing configurations.
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/install.sh
            dist/uninstall.sh
          draft: false
          prerelease: false
